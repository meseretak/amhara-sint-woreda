services:
  - type: web
    name: amhara-sint-woreda
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        value: file:./db/custom.db
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: ADMIN_PASSWORD
        generateValue: false
        value: AmharaSint@2026
      - key: NEXTAUTH_SECRET
        generateValue: true
